---
# Ensures s2n-tls's Minimum Supported Rust Version (MSRV) does not outpace its
# key downstream consumers.
#
# Compiles a consumer (s2n-quic) against *this PR's* s2n-tls using the toolchain
# pinned to the CONSUMER's MSRV. If s2n-tls has raised its MSRV above what the
# consumer can tolerate, this PR's s2n-tls fails to compile, failing the check.
name: MSRV Consumers

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]
    branches: [main]

env:
  ROOT_PATH: bindings/rust/extended

permissions:
  contents: read

jobs:
  s2n-quic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout s2n-tls (this PR)
        uses: actions/checkout@v7
        with:
          path: s2n-tls
          submodules: true

      - name: Checkout s2n-quic
        uses: actions/checkout@v7
        with:
          repository: aws/s2n-quic
          path: s2n-quic
          submodules: true

      # The consumer's MSRV is the toolchain we build with.
      - uses: SebRollen/toml-action@v1.2.0
        id: consumer_msrv
        with:
          file: 's2n-quic/rust-toolchain'
          field: 'toolchain.channel'

      # s2n-tls's own MSRV, read only for a readable log line.
      - uses: SebRollen/toml-action@v1.2.0
        id: s2n_tls_msrv
        with:
          file: 's2n-tls/${{env.ROOT_PATH}}/rust-toolchain.toml'
          field: 'toolchain.channel'

      - name: Install consumer MSRV toolchain
        run: |
          echo "s2n-tls MSRV:  ${{steps.s2n_tls_msrv.outputs.value}}"
          echo "s2n-quic MSRV: ${{steps.consumer_msrv.outputs.value}}"
          rustup toolchain install "${{steps.consumer_msrv.outputs.value}}" --profile minimal

      # go is required for generate.sh to build aws-lc-rs in FIPS mode.
      - name: Install go
        uses: actions/setup-go@v6
        with:
          go-version: '>=1.18'

      - uses: camshaft/rust-cache@v1

      # Produces the s2n-tls-sys bindings needed before the local crates can be
      # used as path dependencies.
      - name: Generate s2n-tls bindings
        run: ./s2n-tls/${{env.ROOT_PATH}}/generate.sh --skip-tests

      # Redirect s2n-quic's crates.io s2n-tls dependency to this PR's checkout.
      # s2n-quic-tls depends on `s2n-tls`, which pulls in `s2n-tls-sys` and
      # `s2n-tls-tokio` via path, so patching these three covers the tree.
      #
      # A [patch.crates-io] entry is silently ignored if its version differs
      # from Cargo.lock, so we `cargo update` to adopt it and then fail loudly
      # if the patch still didn't take (guards against a false-positive pass).
      - name: Patch s2n-quic to use this PR's s2n-tls
        working-directory: s2n-quic
        run: |
          TLS_PATH="${GITHUB_WORKSPACE}/s2n-tls/${{env.ROOT_PATH}}"
          {
            echo ""
            echo "[patch.crates-io]"
            echo "s2n-tls = { path = \"${TLS_PATH}/s2n-tls\" }"
            echo "s2n-tls-sys = { path = \"${TLS_PATH}/s2n-tls-sys\" }"
            echo "s2n-tls-tokio = { path = \"${TLS_PATH}/s2n-tls-tokio\" }"
          } >> Cargo.toml
          tail -n 5 Cargo.toml

          cargo +${{steps.consumer_msrv.outputs.value}} update \
            -p s2n-tls -p s2n-tls-sys -p s2n-tls-tokio

          if cargo +${{steps.consumer_msrv.outputs.value}} tree \
              --package s2n-quic-tls -i s2n-tls 2>&1 \
              | grep -q "patch .* was not used"; then
            echo "ERROR: the [patch.crates-io] override for s2n-tls was not applied."
            exit 1
          fi
          cargo +${{steps.consumer_msrv.outputs.value}} tree \
            --package s2n-quic-tls -i s2n-tls

      # s2n-quic-tls already enables the s2n-tls "quic" feature, so a plain
      # package build exercises the integration. The explicit `+<version>` pins
      # the consumer's MSRV regardless of any checked-in rust-toolchain files.
      - name: Build s2n-quic against this PR's s2n-tls
        working-directory: s2n-quic
        run: |
          if ! cargo +${{steps.consumer_msrv.outputs.value}} build --package s2n-quic-tls; then
            echo "::error::s2n-tls MSRV (${{steps.s2n_tls_msrv.outputs.value}}) has outpaced s2n-quic (${{steps.consumer_msrv.outputs.value}})"
            echo ""
            echo "s2n-tls failed to build against s2n-quic on s2n-quic's MSRV toolchain"
            echo "(${{steps.consumer_msrv.outputs.value}}). Raising s2n-tls's MSRV above a key consumer's is a"
            echo "breaking change for that consumer's users."
            echo ""
            echo "To resolve, either:"
            echo "  * lower the s2n-tls MSRV in ${{env.ROOT_PATH}}/rust-toolchain.toml"
            echo "    (and the matching crate manifests and .clippy.toml), or"
            echo "  * coordinate with s2n-quic to raise its MSRV first."
            exit 1
          fi
