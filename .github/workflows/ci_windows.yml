---
name: Windows (MSYS2)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]
    branches: [main]

permissions:
  contents: read

jobs:
  windows-msys2:
    runs-on: windows-latest
    name: CI Windows (${{matrix.sys}})
    strategy:
      fail-fast: false
      matrix:
        include:
          - sys: ucrt64
            pkg-prefix: mingw-w64-ucrt-x86_64
            env-path: /ucrt64
          - sys: mingw64
            pkg-prefix: mingw-w64-x86_64
            env-path: /mingw64
          - sys: clang64
            pkg-prefix: mingw-w64-clang-x86_64
            env-path: /clang64
            asan: ON
    steps:
      - uses: actions/checkout@v7

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{matrix.sys}}
          update: true
          install: >-
            ${{matrix.pkg-prefix}}-clang
            ${{matrix.pkg-prefix}}-cmake
            ${{matrix.pkg-prefix}}-ninja
            ${{matrix.pkg-prefix}}-go
            ${{matrix.pkg-prefix}}-nasm
            make
            git
            diffutils

      - name: Build AWS-LC
        shell: msys2 {0}
        run: |
          set -eu
          git clone --depth 1 https://github.com/aws/aws-lc.git aws-lc-src
          cmake -B aws-lc-build aws-lc-src -GNinja \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_INSTALL_PREFIX=${{matrix.env-path}}/local \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_TESTING=OFF
          cmake --build aws-lc-build -j $(nproc) --target install

      - name: Build libs2n.a and unit tests
        shell: msys2 {0}
        run: |
          set -eu
          cmake -B build . \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_PREFIX_PATH=${{matrix.env-path}}/local \
            -DS2N_ENFORCE_PROPER_LIBCRYPTO_FEATURE_PROBE=ON \
            -DBUILD_TESTING=ON \
            -DASAN=${{matrix.asan || 'OFF'}}
          cmake --build ./build -j $(nproc)

      - name: Run unit tests
        shell: msys2 {0}
        run: |
          set -eu
          ctest --test-dir build --output-on-failure -j $(nproc)

  rust-bindings:
    runs-on: windows-latest
    name: Rust Bindings (${{matrix.sys}})
    strategy:
      fail-fast: false
      matrix:
        include:
          - sys: ucrt64
            pkg-prefix: mingw-w64-ucrt-x86_64
            env-path: /ucrt64
            rust-target: x86_64-pc-windows-gnu
          - sys: mingw64
            pkg-prefix: mingw-w64-x86_64
            env-path: /mingw64
            rust-target: x86_64-pc-windows-gnu
          - sys: clang64
            pkg-prefix: mingw-w64-clang-x86_64
            env-path: /clang64
            # Rust version 1.89.0 has no gnullvm host toolchain,
            # so use the gnu host and cross-compile to the gnullvm target.
            rust-target: x86_64-pc-windows-gnu
            cargo-target: x86_64-pc-windows-gnullvm
    steps:
      - uses: actions/checkout@v6

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{matrix.sys}}
          update: true
          install: >-
            ${{matrix.pkg-prefix}}-clang
            ${{matrix.pkg-prefix}}-clang-libs
            ${{matrix.pkg-prefix}}-cmake
            ${{matrix.pkg-prefix}}-ninja
            ${{matrix.pkg-prefix}}-go
            ${{matrix.pkg-prefix}}-nasm
            ${{matrix.pkg-prefix}}-rustup
            make
            git
            diffutils
            jq

      - name: Install Rust toolchain
        shell: msys2 {0}
        run: |
          set -eu
          # rust-toolchain.toml pins a channel with no host, so rustup would pick
          # the runner's MSVC host, which can't build build.rs's GCC/Clang flags.
          # Force the MinGW gnu host instead.
          rustup set default-host ${{matrix.rust-target}}
          rustup default stable-${{matrix.rust-target}}
          rustup component add rustfmt
          # gnullvm has no host toolchain at the pinned channel; cross-compile to
          # it from the gnu host by adding its std and forcing the build target.
          if [ -n "${{matrix.cargo-target}}" ]; then
            ( cd bindings/rust/extended && rustup target add ${{matrix.cargo-target}} )
            echo "CARGO_BUILD_TARGET=${{matrix.cargo-target}}" >> "$GITHUB_ENV"
          fi

      - name: Generate and build Rust bindings
        shell: msys2 {0}
        env:
          # msys2 ships clang, not gcc, but cc-rs defaults to gcc for *-gnu.
          CC: clang
          CXX: clang++
          # s2n's uses pthread, clock_gettime, and nanosleep, which on
          # MinGW are provided by winpthreads. The gnu targets link winpthreads
          # automatically, but the gnullvm target does not, so those symbols are
          # undefined at link time. Add -lpthread to link winpthreads explicitly.
          # This env var is target-specific, so it only affects the gnullvm build.
          CARGO_TARGET_X86_64_PC_WINDOWS_GNULLVM_RUSTFLAGS: -Clink-arg=-lpthread
        run: |
          set -eu
          ./bindings/rust/extended/generate.sh
