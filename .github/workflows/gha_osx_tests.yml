---
name: macOS build and test S2n

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]
    branches: [main]

permissions:
  contents: read

jobs:
  OSX:
    runs-on: macos-latest
    steps:
      - name: Checkout Dependencies
        uses: actions/checkout@v6

      - name: Prebuild
        run: |
          .github/install_osx_dependencies.sh

      - name: Build
        run: |
          .github/s2n_osx.sh

  OSX-x64-awslc:
    runs-on: macos-13
    name: macOS x64 with aws-lc (brew OpenSSL conflict)
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          brew install openssl ninja

      - name: Build and install AWS-LC
        run: |
          git clone --depth 1 https://github.com/aws/aws-lc.git
          cmake -B aws-lc-build aws-lc -GNinja \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/aws-lc-install \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_TESTING=OFF
          cmake --build aws-lc-build --target install

      - name: Build s2n-tls
        run: |
          cmake -B build -GNinja \
            -DCMAKE_PREFIX_PATH=${{ github.workspace }}/aws-lc-install \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF
          cmake --build build
