---
name: Linters
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]
    branches: [main]
permissions:
  contents: read

jobs:
  cppcheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Setup
        run: source ./codebuild/bin/s2n_setup_env.sh

      - name: Install
        run: |
          sudo add-apt-repository -y universe
          sudo apt-get update
          sudo apt-get install -y cppcheck=2.13*

      - name: Cache cppcheck build dir
        uses: actions/cache@v6
        with:
          path: .cppcheck-build-dir/
          key: cppcheck-2.13-${{ hashFiles('codebuild/bin/cppcheck_suppressions.txt', '**/*.c', '**/*.h') }}
          restore-keys: |
            cppcheck-2.13-

      - name: Check
        run: ./codebuild/bin/run_cppcheck.sh

  headers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup
        run: source ./codebuild/bin/s2n_setup_env.sh

      - name: Check
        run: ./codebuild/bin/header_mistake_scanner.sh

  simple-mistakes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup
        run: source ./codebuild/bin/s2n_setup_env.sh

      - name: Check
        run: ./codebuild/bin/grep_simple_mistakes.sh

  comments:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup
        run: source ./codebuild/bin/s2n_setup_env.sh

      - name: Install
        run: sudo apt update && sudo apt install -y kwstyle

      - name: Check
        run: |
          ./codebuild/bin/run_kwstyle.sh
          ./codebuild/bin/cpp_style_comment_linter.sh

  ruff:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Run Ruff formatting check
        working-directory: tests/integrationv2
        id: ruff_format
        run: uv run ruff format --diff .
        continue-on-error: true

      - name: Check format exit code
        if: steps.ruff_format.outcome == 'failure'
        run: |
            echo "Run 'uv run ruff format .' to fix formatting issues"
            exit 1

      - name: Run Ruff lint check
        working-directory: tests/integrationv2
        id: ruff_lint
        run: uv run ruff check .
        continue-on-error: true

      - name: Check lint exit code
        if: steps.ruff_lint.outcome == 'failure'
        run: |
          echo "Linting issues detected. Run 'uv run ruff check .' locally to see errors and fix them."
          exit 1

  clang-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: clang-format check
        uses: jidicula/clang-format-action@v4.18.0
        with:
          clang-format-version: '18'
          include-regex: '^(\.\/)?(api|bin|crypto|stuffer|error|tls|utils|tests\/unit|tests\/testlib|docs\/examples).*\.(c|h)$'

  iwyu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y iwyu libssl-dev clang cmake
          include-what-you-use --version

      - name: Generate compilation database
        run: |
          cmake . -B build \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Report unused includes
        # This check is INFORMATIONAL: it reports unused includes but never fails
        # the job. The s2n-tls tree has many pre-existing findings, so gating PRs
        # on it would block all changes. It can be made blocking after a cleanup
        # pass by exiting non-zero when unused includes remain.
        #
        # IWYU flags (forwarded via -Xiwyu):
        #   --mapping_file            s2n include conventions (see .github/config/s2n.imp)
        #   --prefix_header_includes=keep
        #                             s2n compiles every file with `-include s2n_prelude.h`;
        #                             keep it instead of letting IWYU add/remove it.
        #   --no_fwd_decls            s2n is C, so forward-declaration hints don't apply.
        run: |
          IWYU_OUTPUT=$(iwyu_tool -p build \
            crypto error stuffer tls utils tests/unit tests/testlib -- \
            -Xiwyu --mapping_file="$PWD/.github/config/s2n.imp" \
            -Xiwyu --prefix_header_includes=keep \
            -Xiwyu --no_fwd_decls 2>&1)

          # IWYU output is verbose: for each file it also lists includes to ADD
          # and prints a full corrected include-list. Developers here only care
          # about UNUSED includes to delete, so we keep just the
          # "should remove these lines:" sections and reformat each entry as:
          #
          #   path/to/file.c:<line>: unused include <header>
          #
          # which is compact, greppable, and clickable in the CI log. The awk
          # tracks the current file (from the "should remove" header, stripped to
          # a repo-relative path) and, for each "- #include" line under it,
          # extracts the header spelling and the line number from the trailing
          # "// lines X-X" comment.
          UNUSED=$(echo "$IWYU_OUTPUT" | awk -v root="$PWD/" '
            /should remove these lines:/ { file=$1; sub(root, "", file); inremove=1; next }
            /^The full include-list/     { inremove=0 }
            /should add these lines:/    { inremove=0 }
            inremove && /^- #include/ {
              hdr=$0; sub(/^- #include /, "", hdr)
              line=hdr; sub(/.*\/\/ lines /, "", line); sub(/-.*/, "", line)
              inc=hdr;  sub(/  *\/\/.*/, "", inc)
              print file ":" line ": unused include " inc
            }
          ')

          UNUSED_COUNT=$(echo "$UNUSED" | grep -c . || true)
          UNUSED_FILE_COUNT=$(echo "$UNUSED" | sed 's/:.*//' | sort -u | grep -c . || true)

          echo "===== Unused includes ====="
          echo "$UNUSED"
          echo "==========================="
          echo "Total: $UNUSED_COUNT unused include(s) in $UNUSED_FILE_COUNT file(s)"

          {
            echo "## include-what-you-use: unused includes (informational)"
            if [ "$UNUSED_COUNT" -gt 0 ]; then
              echo "Found **$UNUSED_COUNT** unused include(s) across **$UNUSED_FILE_COUNT** file(s)."
              echo "Each line is \`file:line: unused include <header>\` — candidates to delete."
              echo '```'
              echo "$UNUSED"
              echo '```'
            else
              echo "No unused includes found."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$UNUSED_COUNT" -gt 0 ]; then
            echo "::warning::include-what-you-use found $UNUSED_COUNT unused include(s) in $UNUSED_FILE_COUNT file(s) (informational, not blocking)."
          fi
          # Always succeed: this check is informational for now.
          exit 0

  nixflake:
    # The nix develop changes contain broken nixpkg dependenecies; the allow/impure flags workaround this.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: nixbuild/nix-quick-install-action@v35
        with:
          nix_conf: experimental-features = nix-command flakes
      - name: nix flake check
        run: NIXPKGS_ALLOW_BROKEN=1 NIXPKGS_ALLOW_UNSUPPORTED_SYSTEM=1 nix flake check --impure
  nixfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: nixbuild/nix-quick-install-action@v35
        with:
          nix_conf: experimental-features = nix-command flakes
      - name: nix fmt
        run: nix fmt $(find . -name \*nix -type f -not -path "./.git/*")
      - name: Changed files
        id: dirty
        run: |
          echo "Checking nix files with: nix fmt ..."
          git diff --exit-code
        continue-on-error: true
      - name: Failure case
        if: steps.dirty.outcome != 'success'
        run: |
          echo "Please fix formatting with nix fmt (file)"
          exit 1
      - name: Success
        run: echo "All nix files passed format check"
