version: 0.2

env:
  shell: bash
  variables:
    # Select a libcrypto to test the backwards-compatible RAND engine override flag.
    # The flag is now a no-op (the custom RAND engine was removed), but we verify
    # that builds with the flag set to 0 still pass all tests.
    S2N_LIBCRYPTO: "openssl-1.0.2"
    CTEST_OUTPUT_ON_FAILURE: 1

phases:
  pre_build:
    commands:
      - |
        if [ -d "third-party-src" ]; then
          cd third-party-src;
        fi
  build:
    on-failure: ABORT
    commands:
      - |
        cmake . -Brand_override_enabled \
          -DCMAKE_PREFIX_PATH=/usr/local/"${S2N_LIBCRYPTO}" \
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - cmake --build ./rand_override_enabled -- -j $(nproc)
      - |
        cmake . -Brand_override_disabled \
          -DCMAKE_PREFIX_PATH=/usr/local/"${S2N_LIBCRYPTO}" \
          -DCMAKE_BUILD_TYPE=RelWithDebInfo \
          -DS2N_OVERRIDE_LIBCRYPTO_RAND_ENGINE=0
      - cmake --build ./rand_override_disabled -- -j $(nproc)
  post_build:
    on-failure: ABORT
    commands:
      # CTEST_PARALLEL_LEVEL is set outside of env/variables to ensure that `nproc` is evaluated.
      - export CTEST_PARALLEL_LEVEL=$(nproc)
      # Verify that s2n-tls tests pass with the RAND engine override disabled.
      # The S2N_OVERRIDE_LIBCRYPTO_RAND_ENGINE flag is kept for backwards
      # compatibility, but the custom RAND engine was removed as part of the
      # DRBG removal. The flag is now a no-op.
      - make -C rand_override_disabled test
      # Verify that s2n-tls tests also pass with the default (override enabled) build.
      - make -C rand_override_enabled test -- ARGS="-R 's2n_random_test'"
