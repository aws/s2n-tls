[package]
name = "s2n-tls-metrics-subscriber"
version = "0.0.3"
edition = "2024"
description = "Telemetry provider for s2n-tls"
authors = ["AWS s2n"]
repository = "https://github.com/aws/s2n-tls"
license = "Apache-2.0"

[dependencies]
s2n-tls-metrics-schema = { version = "0.0.1", path = "../s2n-tls-metrics-schema" }
s2n-codec.workspace = true
static_assertions = "1.1.0"
tracing = "0.1.43"

metrique-writer = "0.1.19"

arc-swap = "1.8.0"
# minimum versions set for workspace-wide cargo minimal-versions compatibility
serde = { version = "1.0.225", features = ["derive"] }
# we at least need 0.3.36, because that is when the CNSA security policies were introduced
s2n-tls = { version = "0.3.36", path = "../../extended/s2n-tls", features = ["unstable-events", "unstable-testing"] }
s2n-tls-sys = { version = "0.3.36", path = "../../extended/s2n-tls-sys"}
const-oid = "0.10.2"

[features]
fuzzing = []
# Memory-allocation tests have hardcoded expected values that depend on the
# platform's allocator and libcrypto version. Gated behind this opt-in feature
# so workspace-wide `cargo test` skips them; CI runs them in a dedicated job.
memory-test = []

[dev-dependencies]
s2n-tls-sys-internal = { path = "../s2n-tls-sys-internal" }
serde_json = "1.0.141"
ciborium = "0.2"
dhat = "0.3"
tabled = "0.21"
metrique-writer = { version = "0.1.19", features = ["test-util"] }
metrique-writer-format-emf = "0.1.21"

[[test]]
name = "subscriber_memory"
required-features = ["memory-test"]
